<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

:root{
  --bg:#060912;
  --bg-deep:#03050a;
  --panel:#0c1424;
  --panel-alt:#0f1b30;
  --glow:#2dd4ff;
  --glow-soft:rgba(45,212,255,0.35);
  --gold:#fbbf24;
  --danger:#ff4d4d;
  --text:#d6ecff;
  --text-dim:#5b7088;
  --text-bright:#eafcff;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}

body{
  position:relative;
  overflow-x:hidden;
  background:radial-gradient(circle at 50% 0%, rgba(45,212,255,0.06), transparent 60%), var(--bg);
}

.scanlines{
  position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 2px, transparent 3px);
  mix-blend-mode:overlay;
}

.wrap{ max-width:480px; margin:0 auto; padding:20px 16px 60px; position:relative; }

.boot{
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Share Tech Mono', monospace; color:var(--glow); letter-spacing:2px; gap:10px;
}
.boot .line{opacity:0; animation:fadeIn .5s forwards;}
.boot .line:nth-child(1){animation-delay:.1s;}
.boot .line:nth-child(2){animation-delay:.6s;}
.boot .line:nth-child(3){animation-delay:1.1s;}
@keyframes fadeIn{to{opacity:1;}}
.hidden{display:none !important;}

.frame{ position:relative; padding:2px; clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px); background:linear-gradient(135deg, var(--glow), rgba(45,212,255,0.15)); margin-bottom:16px; box-shadow:0 0 16px var(--glow-soft); }
.frame.pulse{ animation:pulse 3s ease-in-out infinite; }
@keyframes pulse{0%,100%{box-shadow:0 0 16px var(--glow-soft);}50%{box-shadow:0 0 28px var(--glow-soft);}}
.frame-inner{ background:var(--panel); clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px); padding:18px; }

.eyebrow{ font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; margin:0 0 4px; }

.header-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
.rank-badge{ font-family:'Share Tech Mono',monospace; font-weight:700; font-size:28px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; border:2px solid #94a3b8; color:#94a3b8; clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px); text-shadow:0 0 10px currentColor; flex-shrink:0; }
.name-input{ background:transparent; border:none; border-bottom:1px solid rgba(45,212,255,0.3); color:var(--text-bright); font-family:'Rajdhani',sans-serif; font-weight:600; font-size:18px; padding:2px 0; width:100%; }
.name-input:focus{ outline:none; border-bottom-color:var(--glow); }
.lvl-tag{ font-family:'Share Tech Mono',monospace; color:var(--glow); font-size:13px; }

.xp-bar-bg{ height:10px; background:var(--bg-deep); border:1px solid rgba(45,212,255,0.25); margin-top:10px; position:relative; clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px); }
.xp-bar-fill{ height:100%; background:linear-gradient(90deg, var(--glow), #7ee8ff); box-shadow:0 0 10px var(--glow-soft); transition:width .4s ease; }
.xp-label{ font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); margin-top:6px; text-align:right; }

.streak-row{ display:flex; justify-content:space-between; margin-top:10px; font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--text-dim); }
.streak-row b{ color:var(--gold); }

.stats-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
.stat-row{ display:flex; align-items:center; justify-content:space-between; background:var(--panel-alt); padding:8px 10px; border-left:2px solid var(--glow); }
.stat-name{ font-size:13px; letter-spacing:1px; color:var(--text-dim); }
.stat-val{ font-family:'Share Tech Mono',monospace; font-size:16px; color:var(--text-bright); display:flex; align-items:center; gap:6px; }
.stat-plus{ background:none; border:1px solid var(--glow); color:var(--glow); width:20px; height:20px; line-height:1; border-radius:3px; cursor:pointer; font-size:13px; }
.stat-plus:disabled{ opacity:.2; cursor:default; }
.points-banner{ font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--gold); margin-top:10px; text-align:center; }

.quest-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(45,212,255,0.1); }
.quest-row:last-child{ border-bottom:none; }
.q-check{ width:22px; height:22px; flex-shrink:0; border:2px solid var(--glow); background:transparent; clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--glow); font-size:13px; }
.q-check.done{ background:var(--glow); color:var(--bg); box-shadow:0 0 8px var(--glow); cursor:default; }
.q-name{ flex:1; font-size:15px; }
.q-name.done{ color:var(--text-dim); text-decoration:line-through; }
.q-xp{ font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); }
.q-del{ background:none; border:none; color:var(--text-dim); font-size:16px; cursor:pointer; padding:0 2px; }
.q-del:hover{ color:var(--danger); }

.add-quest{ display:flex; gap:6px; margin-top:12px; }
.add-quest input{ background:var(--bg-deep); border:1px solid rgba(45,212,255,0.25); color:var(--text); padding:8px; font-family:'Rajdhani',sans-serif; font-size:13px; flex:1; }
.add-quest input.xp-input{ flex:0 0 56px; }
.add-quest input:focus{ outline:none; border-color:var(--glow); }
.btn{ background:var(--glow); border:none; color:var(--bg); font-weight:700; padding:8px 14px; cursor:pointer; font-family:'Rajdhani',sans-serif; clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px); }

.history-row{ display:flex; justify-content:space-between; align-items:center; font-family:'Share Tech Mono',monospace; font-size:12px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.history-row .ok{ color:#4ade80; }
.history-row .fail{ color:var(--danger); }
.empty-state{ color:var(--text-dim); font-size:13px; text-align:center; padding:10px 0; }

footer{ text-align:center; margin-top:24px; }
.reset-link{ background:none; border:none; color:var(--text-dim); font-size:11px; text-decoration:underline; cursor:pointer; font-family:'Share Tech Mono',monospace; }

.notify-container{ position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:10000; width:calc(100% - 32px); max-width:440px; }
.toast{ background:var(--panel); border:1px solid var(--glow); box-shadow:0 0 24px var(--glow-soft); padding:14px 16px; clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px); transform:translateY(-120%); opacity:0; transition:transform .35s ease, opacity .35s ease; margin-bottom:8px; }
.toast.show{ transform:translateY(0); opacity:1; }
.toast .tag{ font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--glow); letter-spacing:2px; margin-bottom:4px; }
.toast .msg{ font-size:15px; color:var(--text-bright); min-height:20px; }
.toast.rankup{ border-color:var(--gold); box-shadow:0 0 24px rgba(251,191,36,0.4); }
.toast.rankup .tag, .toast.rankup .msg{ color:var(--gold); }

h2.section-title{ font-family:'Rajdhani',sans-serif; font-size:14px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin:0 0 12px; display:flex; align-items:center; gap:8px; }
h2.section-title::before{ content:''; width:6px; height:6px; background:var(--glow); display:inline-block; }

@media(max-width:360px){ .stats-grid{ grid-template-columns:1fr; } }

.support-btn{ background:var(--gold); border:none; color:var(--bg); font-weight:700; padding:8px 12px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:12px; clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px); }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="notify-container" id="notifyContainer"></div>

<div class="boot" id="boot">
  <div class="line">[ SYSTEM ]</div>
  <div class="line">Initializing Hunter Interface...</div>
  <div class="line">Status: <span style="color:#4ade80">ONLINE</span></div>
</div>

<div class="wrap hidden" id="app">

  <div style="text-align:right; margin-bottom:12px;">
    <button class="support-btn" id="supportBtn">☕ Support</button>
  </div>

  <div class="frame pulse">
    <div class="frame-inner">
      <div class="eyebrow">Hunter Status</div>
      <div class="header-row">
        <div class="rank-badge" id="rankBadge">E</div>
        <div style="flex:1;">
          <input class="name-input" id="nameInput" maxlength="20" value="Hunter" />
          <div class="lvl-tag" id="lvlTag">LV. 1</div>
        </div>
      </div>
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpFill" style="width:0%"></div></div>
      <div class="xp-label" id="xpLabel">0 / 100 XP</div>
      <div class="streak-row">
        <span>Streak: <b id="streakVal">0</b> days</span>
        <span id="todayDate"></span>
      </div>
    </div>
  </div>

  <div class="frame">
    <div class="frame-inner">
      <h2 class="section-title">Stats</h2>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="points-banner hidden" id="pointsBanner"></div>
    </div>
  </div>

  <div class="frame">
    <div class="frame-inner">
      <h2 class="section-title">Daily Quest</h2>
      <div id="questList"></div>
      <div class="add-quest">
        <input type="text" id="newQuestName" placeholder="New quest name" maxlength="40" />
        <input type="number" id="newQuestXp" class="xp-input" placeholder="XP" min="1" max="200" value="15" />
        <button class="btn" id="addQuestBtn">+</button>
      </div>
    </div>
  </div>

  <div class="frame">
    <div class="frame-inner">
      <h2 class="section-title">Quest Log</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <footer>
    <button class="reset-link" id="resetBtn">Reset all progress</button>
  </footer>

</div>

<script type="module">
// ============ FIREBASE INITIALIZATION ============
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";

// YOUR FIREBASE CONFIG - REPLACE WITH YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCNwC_JNHtp8R1XaTAkp_bPJ3sbqh-jfQ",
  authDomain: "ascend-level-up.firebaseapp.com",
  projectId: "ascend-level-up",
  storageBucket: "ascend-level-up.firebasestorage.app",
  messagingSenderId: "644326876476",
  appId: "1:644326876476:web:a5c5ae5f6b8a05a896b8e0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let unsubscribeSnapshot = null;
let isFirebaseSyncing = false;

// ============ STATE & RANK SYSTEM ============
let state = {};
const rankTable = [
  {min:0, name:'E', color:'#94a3b8'},
  {min:10, name:'D', color:'#60a5fa'},
  {min:25, name:'C', color:'#34d399'},
  {min:45, name:'B', color:'#fbbf24'},
  {min:70, name:'A', color:'#f87171'},
  {min:100, name:'S', color:'#a78bfa'},
];

function defaultState(){
  return {
    name:'Hunter',
    level:1,
    xp:0,
    stats:{STR:1, DEX:1, INT:1, VIT:1, WIS:1, LCK:1},
    quests:[],
    history:[],
    streak:0,
    lastDate:todayStr(),
    unallocated:0,
    bonusGiven:false,
  };
}

function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0'); }
function xpNeeded(lvl){ return Math.round(100*(1.05**lvl)); }
function rankFor(lvl){ return rankTable.reduce((a,b)=>lvl>=b.min?b:a); }

// ============ FIREBASE SYNC ============
async function saveStateToFirebase(stateObj){
  if(!currentUser || isFirebaseSyncing) return;
  try{
    isFirebaseSyncing = true;
    const userDocRef = doc(db, 'hunters', currentUser.uid);
    await setDoc(userDocRef, {
      name: stateObj.name,
      level: stateObj.level,
      xp: stateObj.xp,
      stats: stateObj.stats,
      quests: stateObj.quests,
      history: stateObj.history,
      streak: stateObj.streak,
      lastDate: stateObj.lastDate,
      unallocated: stateObj.unallocated,
      bonusGiven: stateObj.bonusGiven,
      lastUpdated: new Date().toISOString(),
    });
    localStorage.setItem('hunterState', JSON.stringify(stateObj));
  } catch(err){
    console.error('Firebase save error:', err);
  } finally{
    isFirebaseSyncing = false;
  }
}

async function loadStateFromFirebase(userId){
  try{
    const userDocRef = doc(db, 'hunters', userId);
    const docSnap = await getDoc(userDocRef);
    if(docSnap.exists()){
      return docSnap.data();
    }
  } catch(err){
    console.error('Firebase load error:', err);
  }
  return null;
}

function setupFirebaseListener(userId){
  if(unsubscribeSnapshot) unsubscribeSnapshot();
  try{
    const userDocRef = doc(db, 'hunters', userId);
    unsubscribeSnapshot = onSnapshot(userDocRef, (doc)=>{
      if(doc.exists()){
        const fbData = doc.data();
        // Only update if remote data is newer
        if(fbData && fbData.lastUpdated > new Date(state.lastUpdated || 0).toISOString()){
          state = {
            name: fbData.name || state.name,
            level: fbData.level || state.level,
            xp: fbData.xp !== undefined ? fbData.xp : state.xp,
            stats: fbData.stats || state.stats,
            quests: fbData.quests || state.quests,
            history: fbData.history || state.history,
            streak: fbData.streak !== undefined ? fbData.streak : state.streak,
            lastDate: fbData.lastDate || state.lastDate,
            unallocated: fbData.unallocated !== undefined ? fbData.unallocated : state.unallocated,
            bonusGiven: fbData.bonusGiven !== undefined ? fbData.bonusGiven : state.bonusGiven,
            lastUpdated: fbData.lastUpdated || new Date().toISOString(),
          };
          render();
          queueNotify('SYNC', 'Progress synced from another device.', 'normal');
        }
      }
    });
  } catch(err){
    console.error('Firebase listener error:', err);
  }
}

// ============ LOCAL STORAGE FALLBACK ============
async function loadState(){
  if(currentUser){
    const fbState = await loadStateFromFirebase(currentUser.uid);
    if(fbState){
      return fbState;
    }
  }
  const local = localStorage.getItem('hunterState');
  return local ? JSON.parse(local) : null;
}

function saveState(stateObj){
  localStorage.setItem('hunterState', JSON.stringify(stateObj));
  if(currentUser){
    saveStateToFirebase(stateObj);
  }
}

// ============ UI & GAME LOGIC ============
let notifyBusy = false;
function queueNotify(tag, msg, style='normal'){
  if(notifyBusy) return;
  notifyBusy = true;
  const container = document.getElementById('notifyContainer');
  const toast = document.createElement('div');
  toast.className = 'toast '+style;
  toast.innerHTML = '<div class="tag">'+escapeHtml(tag)+'</div><div class="msg">'+escapeHtml(msg)+'</div>';
  container.appendChild(toast);
  setTimeout(()=>toast.classList.add('show'), 10);
  setTimeout(()=>{
    toast.classList.remove('show');
    setTimeout(()=>{ container.removeChild(toast); notifyBusy=false; }, 350);
  }, 3000);
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function applyDailyReset(){
  const today = todayStr();
  if(state.lastDate === today) return;
  const hadQuests = state.quests.length>0;
  const allDone = hadQuests && state.quests.every(q=>q.done);
  const doneCount = state.quests.filter(q=>q.done).length;
  if(hadQuests){
    state.history.unshift({date:state.lastDate, completed:allDone, count:doneCount, total:state.quests.length});
    state.history = state.history.slice(0,14);
    state.streak = allDone ? state.streak+1 : 0;
  }
  state.quests.forEach(q=>q.done=false);
  state.bonusGiven = false;
  state.lastDate = today;
}

function addXP(amount){
  state.xp += amount;
  let leveled=false;
  const prevRank = rankFor(state.level).name;
  while(state.xp >= xpNeeded(state.level)){
    state.xp -= xpNeeded(state.level);
    state.level += 1;
    state.unallocated += 3;
    leveled = true;
  }
  const newRank = rankFor(state.level).name;
  if(leveled) queueNotify('SYSTEM', 'Level Up! You are now Level '+state.level+'.', 'normal');
  if(newRank !== prevRank) queueNotify('RANK UP', 'Your rank has risen to '+newRank+'-Rank.', 'rankup');
}

function toggleQuest(id){
  const q = state.quests.find(x=>x.id===id);
  if(!q || q.done) return;
  q.done = true;
  addXP(q.xp);
  queueNotify('QUEST CLEAR', '"'+q.name+'" complete. +'+q.xp+' XP', 'normal');
  const allDone = state.quests.length>0 && state.quests.every(x=>x.done);
  if(allDone && !state.bonusGiven){
    state.bonusGiven = true;
    state.unallocated += 1;
    addXP(20);
    queueNotify('SYSTEM', 'Daily Quest Complete! Bonus +20 XP, +1 stat point.', 'normal');
  }
  persistAndRender();
}

function allocateStat(key){
  if(state.unallocated<=0) return;
  state.stats[key] += 1;
  state.unallocated -= 1;
  persistAndRender();
}

function addQuest(){
  const nameInput = document.getElementById('newQuestName');
  const xpInput = document.getElementById('newQuestXp');
  const name = nameInput.value.trim();
  const xp = Math.max(1, Math.min(200, parseInt(xpInput.value,10) || 15));
  if(!name) return;
  state.quests.push({id:'q'+Date.now(), name, xp, done:false});
  nameInput.value=''; xpInput.value='15';
  persistAndRender();
}
function deleteQuest(id){ state.quests = state.quests.filter(q=>q.id!==id); persistAndRender(); }
function resetAll(){
  if(!confirm('This will erase all your progress. Continue?')) return;
  state = defaultState();
  persistAndRender();
}
function persistAndRender(){ saveState(state); render(); }

function render(){
  const rank = rankFor(state.level);
  const badge = document.getElementById('rankBadge');
  badge.textContent = rank.name;
  badge.style.borderColor = rank.color;
  badge.style.color = rank.color;
  document.getElementById('lvlTag').textContent = 'LV. '+state.level;
  document.getElementById('nameInput').value = state.name;
  const needed = xpNeeded(state.level);
  document.getElementById('xpFill').style.width = Math.min(100,(state.xp/needed)*100)+'%';
  document.getElementById('xpLabel').textContent = state.xp+' / '+needed+' XP';
  document.getElementById('streakVal').textContent = state.streak;
  document.getElementById('todayDate').textContent = state.lastDate;

  const statsGrid = document.getElementById('statsGrid');
  statsGrid.innerHTML = '';
  Object.keys(state.stats).forEach(key=>{
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = '<span class="stat-name">'+key+'</span><span class="stat-val">'+state.stats[key]+
      '<button class="stat-plus" data-stat="'+key+'" '+(state.unallocated<=0?'disabled':'')+'>+</button></span>';
    statsGrid.appendChild(row);
  });
  const pb = document.getElementById('pointsBanner');
  if(state.unallocated>0){ pb.classList.remove('hidden'); pb.textContent = '+'+state.unallocated+' points available to allocate'; }
  else { pb.classList.add('hidden'); }

  const ql = document.getElementById('questList');
  ql.innerHTML = '';
  if(state.quests.length===0){ ql.innerHTML = '<div class="empty-state">No quests yet. Add one below.</div>'; }
  state.quests.forEach(q=>{
    const row = document.createElement('div');
    row.className = 'quest-row';
    row.innerHTML =
      '<button class="q-check '+(q.done?'done':'')+'" data-id="'+q.id+'">'+(q.done?'✓':'')+'</button>'+
      '<span class="q-name '+(q.done?'done':'')+'">'+escapeHtml(q.name)+'</span>'+
      '<span class="q-xp">+'+q.xp+'xp</span>'+
      '<button class="q-del" data-id="'+q.id+'">×</button>';
    ql.appendChild(row);
  });

  const hl = document.getElementById('historyList');
  hl.innerHTML = '';
  if(state.history.length===0){ hl.innerHTML = '<div class="empty-state">Your quest history will appear here.</div>'; }
  state.history.forEach(h=>{
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = '<span>'+h.date+'</span><span class="'+(h.completed?'ok':'fail')+'">'+
      (h.completed?'CLEARED':'FAILED')+' ('+h.count+'/'+h.total+')</span>';
    hl.appendChild(row);
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ SUPPORT BUTTON ============
function openSupport(){
  const upiLink = 'upi://pay?pa=arora13rudeus@fam&pn=Ascend%20Level%20Up&tn=Support%20Ascend&am=';
  window.location.href = upiLink;
}

document.addEventListener('click', (e)=>{
  if(e.target.matches('.q-check')) toggleQuest(e.target.dataset.id);
  if(e.target.matches('.q-del')) deleteQuest(e.target.dataset.id);
  if(e.target.matches('.stat-plus')) allocateStat(e.target.dataset.stat);
  if(e.target.id==='addQuestBtn') addQuest();
  if(e.target.id==='resetBtn') resetAll();
});

// ============ INITIALIZATION ============
(async function init(){
  document.getElementById('supportBtn').addEventListener('click', openSupport);
  
  onAuthStateChanged(auth, async (user) => {
    if(user){
      currentUser = user;
      const loaded = await loadState();
      state = loaded || defaultState();
      if(state.bonusGiven===undefined) state.bonusGiven=false;
      applyDailyReset();
      setupFirebaseListener(user.uid);
    } else {
      const loaded = await loadState();
      state = loaded || defaultState();
      if(state.bonusGiven===undefined) state.bonusGiven=false;
      applyDailyReset();
    }
    
    render();
    document.getElementById('nameInput').addEventListener('change', (e)=>{
      state.name = e.target.value.trim() || 'Hunter';
      persistAndRender();
    });
    document.getElementById('newQuestName').addEventListener('keydown', (e)=>{ if(e.key==='Enter') addQuest(); });
    await sleep(1700);
    document.getElementById('boot').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    saveState(state);
  });
  
  // Try to sign in anonymously
  try{
    await signInAnonymously(auth);
  } catch(err){
    console.error('Auth error:', err);
  }
})();

</script>
</body>
